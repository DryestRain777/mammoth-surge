<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0705" />
    <meta name="robots" content="noindex" />
    <title>Order Confirmed — Mammoth Surge™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        .status { min-height: 100svh; display: grid; place-items: center; padding: 6rem 1.5rem; text-align: center; position: relative; }
        .status__glow { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); width: 600px; height: 400px; background: radial-gradient(circle, rgba(255,90,31,.28), transparent 60%); filter: blur(20px); pointer-events: none; }
        .status__inner { position: relative; max-width: 560px; }
        .status__badge { width: 92px; height: 92px; margin: 0 auto 1.6rem; border-radius: 50%; display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, #1c120a, #0a0604); border: 2px solid var(--gold-deep); box-shadow: 0 0 40px rgba(255,90,31,.4); animation: floaty 5s ease-in-out infinite; }
        .status__badge svg { color: var(--gold); }
        .status h1 { font-family: var(--font-display); font-weight: 900; font-size: clamp(2.4rem, 6vw, 3.6rem); line-height: 1; margin-bottom: 1rem; }
        .status p { color: var(--ink-dim); font-size: 1.08rem; }
        .status__card { margin: 2rem auto 0; max-width: 420px; border: 1px solid var(--line); border-radius: 16px; background: var(--card-2); padding: 1.4rem 1.6rem; text-align: left; }
        .status__row { display: flex; justify-content: space-between; gap: 1rem; padding: 0.45rem 0; font-size: 0.95rem; }
        .status__row span { color: var(--ink-faint); }
        .status__row b { color: var(--ink); font-weight: 700; }
        .status__cta { margin-top: 2.2rem; }
    </style>
</head>
<body>
    <canvas id="ember-canvas" aria-hidden="true"></canvas>
    <main class="status">
        <div class="status__glow" aria-hidden="true"></div>
        <div class="status__inner">
            <div class="status__badge">
                <svg viewBox="0 0 24 24" width="44" height="44" aria-hidden="true"><path d="M4 12.5 9 17.5 20 6.5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h1>You've <span class="grad">surged.</span></h1>
            <p>Thank you for your order. A confirmation is on its way to your inbox, and your Mammoth Surge is being prepped for discreet shipping.</p>

            <div class="status__card" id="summary" hidden>
                <div class="status__row"><span>Status</span><b id="s-status">—</b></div>
                <div class="status__row"><span>Email</span><b id="s-email">—</b></div>
                <div class="status__row"><span>Total</span><b id="s-total">—</b></div>
            </div>

            <div class="status__cta">
                <a href="index.html" class="btn btn--primary">
                    <span>Back to Home</span>
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        (function () {
            const params = new URLSearchParams(location.search);
            const id = params.get("session_id");
            const api = (window.MAMMOTH_CONFIG && window.MAMMOTH_CONFIG.apiBase || "").replace(/\/$/, "");
            if (!id || !api) return;
            fetch(`${api}/api/order/${id}`)
                .then((r) => (r.ok ? r.json() : null))
                .then((d) => {
                    if (!d) return;
                    document.getElementById("s-status").textContent = d.status === "paid" ? "Paid ✓" : d.status;
                    document.getElementById("s-email").textContent = d.email || "—";
                    document.getElementById("s-total").textContent =
                        new Intl.NumberFormat(undefined, { style: "currency", currency: (d.currency || "usd").toUpperCase() }).format(d.amountTotal || 0);
                    document.getElementById("summary").hidden = false;
                })
                .catch(() => {});
        })();
    </script>
    <script src="js/script.js"></script>
</body>
</html>
